#
# AbsolutEvents - configuração principal
#

# =====================================================
# DATABASE
# =====================================================

MySQL:
  Enabled: false
  Host: localhost
  Username: root
  Password: pass
  Database: absolutevents
  Port: 3306

# =====================================================
# COMANDOS PERMITIDOS DURANTE EVENTOS
# =====================================================

Allowed commands:
- '/g'
- '/l'
- '/tell'
- '/evento'
- '/event'
- '/events'
- '/ev'

Admin permission: absolutevents.admin

# =====================================================
# AUTO START DE EVENTOS
# =====================================================

AutoStart:
  Enabled: true

  Times:
  - 'parkour-20:30'
  - 'sunday-campominado-18:00'
    # formatos aceitos:
    # evento-horario
    # dia-evento-horario

# =====================================================
# CONFIGURAÇÕES GERAIS
# =====================================================

Enable GUI: true
Show commands: true
Save inventory: true
Spectator gamemode: false

# Hook atualmente usado
Hook: simpleclans

# =====================================================
# BROADCAST GLOBAL DOS EVENTOS
# =====================================================

Broadcast:
  Mode: GLOBAL
  Global:
    - ''
    - '&#ff69f0Evento &f@name &#ff69f0Clique @join_button &#ff69f0para participar!'
    - '&#ff69f0Prêmio: @reward'
    - '&#ff69f0Jogadores: &#0088ff@players &#ff69f0Restantes: &#0088ff@broadcasts'
    - ''

# =====================================================
# FORMATAÇÃO GLOBAL DE MENSAGENS
# =====================================================

MessageFormat:
  Enabled: true
  ConfigMessagesMode: GLOBAL
  BaseColor: '&#ff69f0'
  ValueColor: '&#0088ff'
  IgnorePaths:
  - 'messages.join button.text'
  - 'messages.join button.hover'
  - 'messages.prefix'

# =====================================================
# BUNGEECORD
# =====================================================

Bungeecord:
  Enabled: false
  Default: rankup

  Servers:
  - 'rankup'
  - 'factions'

  Send to default: false
  Commands on default: false

# =====================================================
# UPDATE CHECKER
# =====================================================

UpdateChecker: false

# =====================================================
# FORMATAÇÃO DE DINHEIRO
# =====================================================

Formatter:
  Type: letter

  Letters:
  - ''
  - 'K'
  - 'M'
  - 'B'
  - 'T'
  - 'Q'
  - 'QQ'
  - 'S'
  - 'SS'
  - 'O'
  - 'N'
  - 'D'

# =====================================================
# CONVERSOR DE PLUGINS ANTIGOS
# =====================================================

Conversor:
  Enabled: false
  Plugin: yeventos

  MySQL:
    Enabled: false
    Host: localhost
    Username: root
    Password: pass
    Database: heventos
    Port: 3306

  yEventos:
    parkour: parkour
    campominado: campominado
    spleef: spleef
    corrida: corrida
    semaforo: semaforo
    batataquente: batataquente
    frog: frog
    fight: fight
    killer: killer
    sumo: sumo
    astronauta: astronauta
    paintball: paintball
    votacao: votacao
    hunter: hunter
    quiz: quiz
    anvil: anvil
    loteria: loteria
    bolao: bolao
    gladiador: gladiador
    matematica: matematica
    palavra: palavra
    fastclick: fastclick
    nexus: nexus
    sorteio: sorteio
    thor: thor
    battleroyale: battleroyale

# =====================================================
# MENSAGENS
# =====================================================

Messages:
  Prefix: '&#ff69f0[Evento] '

  Join Button:
    Text: '&aaqui'
    Hover:
    - '&7Clique para participar do evento'
    Command: /evento

  No event: '&#ff69f0Não está ocorrendo nenhum evento no momento!'
  No spectator: '&#ff69f0Não é possível assistir esse evento.'
