Evento:
  Title: "Astronauta"
  Type: "fall"
  Calls: 5
  Calls interval: 15
  Mininum players: 2
  Eliminate on quit: true
  Empty inventory: true
  Permission: "absolutevents.evento"
  Count participation: true
  Count victory: true
  Time: 15

# 🎬 Titles
Title:
  Enabled: true
  FadeIn: 10
  Stay: 40
  FadeOut: 10

  Start:
    Title: '&b&lASTRONAUTA'
    Subtitle: '&fSobreviva por @time segundos'

  Final:
    Title: '&e&lFASE FINAL'
    Subtitle: '&fSegure por mais alguns segundos!'

# 🌌 Efeitos da queda
Effects:
  Enabled: true
  Levitation ticks: 30
  Slow falling ticks: 220

# 💬 Mensagens
Messages:
  Broadcast:
    - ""
    - "&3[@name] &bIniciando evento &f@name"
    - "&3[@name] &bPara participar, digite &f/evento"
    - "&3[@name] &bPrêmio: &2$&f@money &b+ &b[Astronauta]"
    - "&3[@name] &bJogadores no evento: &f@players"
    - "&3[@name] &bChamadas restantes: &f@broadcasts"
    - ""

  Start:
    - ""
    - "&3[@name] &bIniciando evento..."
    - ""

  Winner:
    - ""
    - "&3[@name] &bO evento &f@name &bfoi finalizado!"
    - "&3[@name] &bSobreviveram: &f@winner"
    - ""

  No winner:
    - ""
    - "&3[@name] &bO evento &f@name &bfoi finalizado!"
    - "&3[@name] &cTodos falharam na queda!"
    - ""

  Cancelled:
    - ""
    - "&3[@name] &bO evento foi cancelado manualmente."
    - ""

  # Actionbar durante o evento
  Actionbar: '&bTempo restante: &f@time &8| &fJogadores vivos: &b@players'

  # Quando alguém é eliminado
  Player eliminated:
    - '&b[@name] &f@player &cfalhou na queda!'

# 💰 Recompensas
Rewards:
  Money: 1000
  Commands:
    - "give @winner diamond 1"

# 📍 Localizações
Locations:
  Lobby: []
  Entrance: []
  Spectator: []
  Exit: []
  Server: null