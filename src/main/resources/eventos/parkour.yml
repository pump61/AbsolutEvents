  Back: '&6[@name] &eVocê voltou ao início.'
  Back item: '&aVoltar ao Checkpoint'
  Back cooldown: '&cAguarde @time para usar novamente.'
  Actionbar: '&fTempo: &a@time &8| &fRecorde: &e@best &8| &fCheckpoint: &b@cooldown'

