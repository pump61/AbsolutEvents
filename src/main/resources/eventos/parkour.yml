Evento:
  Title: Parkour
  Type: sign
  Calls: 10
  Calls interval: 15
  Mininum players: 2
  Eliminate on quit: true
  Empty inventory: true
  Permission: absolutevents.evento
  Count participation: false
  Count victory: false
  Return on damage: true
  Back item cooldown: 5
  Back item material: SLIME_BALL
  Back item slot: 8
  Back item sound: entity.enderman.teleport

Messages:
  Broadcast:
    - ''
    - '&6Evento &f@name &6digite &f/evento'
    - '&6Jogadores no evento: &f@players &6Chamadas restantes: &f@broadcasts'
    - ''

  Start:
    - ''
