    - '&6[@name] &eA quantidade mínima de jogadores não foi atingida.'
    - ''

  Cancelled:
    - ''
    - '&6[@name] &eO evento foi cancelado manualmente.'
    - ''

  Sign:
    - '&e&l[Parkour]'
