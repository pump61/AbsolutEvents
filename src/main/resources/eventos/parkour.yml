  Empty inventory: true
  Permission: absolutevents.evento
  Count participation: true
  Count victory: true
  Return on damage: true
  Back item cooldown: 5
  Back item material: SLIME_BALL
  Back item slot: 8
  Back item sound: entity.enderman.teleport

