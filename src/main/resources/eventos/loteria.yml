Evento:
  Title: "Loteria"
  Type: "loteria"
  Calls: 5
  Calls interval: 15
  Permission: "absolutevents.evento"
  Count participation: true
  Count victory: true
  Reward: 10000
  Cost: 0
  Max number: 100

Messages:
  Broadcast:
    - ""
    - "&#ff69f0Evento &f@name &#ff69f0Aposte usando: &f/evento <0 até @max>"
    - "&#ff69f0Prêmio: &#0088ff$&f@reward &#ff69f0+ &2[Loteria]"
    - "&#ff69f0Custo: &#0088ff$&f@cost"
    - "&#ff69f0Chamadas restantes: &#0088ff@broadcasts"
    - ""

  Winner:
    - ""
    - "&#ff69f0O evento &f@name &#ff69f0foi finalizado!"
    - "&#ff69f0O vencedor foi &f@winner&#ff69f0!"
    - "&#ff69f0Número sorteado: &f@number"
    - ""

  No winner:
    - ""
    - "&#ff69f0O evento &f@name &#ff69f0foi finalizado!"
    - "&#ff69f0Não houveram vencedores."
    - "&#ff69f0Número sorteado: &f@number"
    - ""

  Cancelled:
    - ""
    - "&#ff69f0O evento foi cancelado manualmente."
    - ""

  No money: "&#ff69f0Você não tem dinheiro suficiente para apostar. &f(@cost)"
  Lose: "&#ff69f0Você apostou no número &f@number&#ff69f0, mas não venceu."
  Invalid: "&#ff69f0Uso correto: &f/evento <0 até @max>"

Rewards:
  Commands:
  - "# adicione seus comandos aqui"
  Broadcast:
    - "&#0088ff$&f@reward &#ff69f0+ &2[Loteria]"