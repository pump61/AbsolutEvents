    - 'Jogadores no evento: @players'
    - ''

  Start:
    - ''
    - '[@name] Iniciando evento...'
    - ''

  Winner:
    - ''
    - '[@name] O evento terminou!'
    - 'Vencedor: @winner'
    - 'Blocos pintados: @blocks'
    - 'Top 3:'
    - '@top1'
    - '@top2'
    - '@top3'
    - ''

  No winner:
    - ''
    - '[@name] O evento terminou!'
    - 'Não houve vencedor.'
    - 'Top 3:'
    - '@top1'
    - '@top2'
    - '@top3'
    - ''

  No players:
    - ''
    - '[@name] Evento cancelado.'
    - 'Jogadores insuficientes.'
    - ''

  Cancelled:
    - ''
    - '[@name] Evento cancelado manualmente.'
    - ''

  Start evento:
