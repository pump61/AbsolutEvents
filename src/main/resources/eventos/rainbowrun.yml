Evento:
  Title: Rainbow Run
  Type: rainbowrun
  Calls: 10
  Calls interval: 15
  Mininum players: 2
  Eliminate on quit: true
  Empty inventory: true
  Permission: absolutevents.evento
  Count participation: false
  Count victory: false
  Start: 10
  Max time: 2

