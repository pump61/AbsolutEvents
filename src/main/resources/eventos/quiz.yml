Evento:
  Title: Quiz
  Type: quiz
  Calls: 10
  Calls interval: 15
  Mininum players: 2
  Eliminate on quit: true
  Empty inventory: true
  Spectator mode: true
  Permission: absolutevents.evento
  Count participation: true
  Count victory: true
  Time: 15
  Interval: 5
  Max questions: 50
  First question delay: 5

Title:
  Enabled: true
  FadeIn: 10
  Stay: 30
  FadeOut: 10
  
  Question:
    Title: '&e&lQUIZ'
    Subtitle: '&f@question'
  
  Answer:
    Title: '&a&lRESPOSTA CORRETA'
    Subtitle: '&f@answer'

  First question:
    Title: '&6&lPRIMEIRA PERGUNTA'
    Subtitle: '&fComeçará em @time segundos'
  
  Next round:
    Title: '&b&lPRÓXIMA RODADA'
    Subtitle: '&fPróxima pergunta em @time segundos'

Messages:
  Broadcast:
    - ''
    - '&#ff69f0Evento &f@name &#ff69f0Clique @join_button &#ff69f0para participar!'
    - '&#ff69f0Prêmio: &#0088ff$&f@money'
    - '&#ff69f0Jogadores: &#0088ff@players &#ff69f0Chamadas restantes: &#0088ff@broadcasts'
    - ''

  Start:
    - ''
    - '&#ff69f0Iniciando evento...'
    - ''

  Winner:
    - ''
    - '&#ff69f0O evento &f@name &#ff69f0foi finalizado!'
    - '&#ff69f0O vencedor foi &f@winner&#ff69f0!'
    - ''

  No winner:
    - ''
    - '&#ff69f0O evento &f@name &#ff69f0foi finalizado!'
    - '&#ff69f0Não houveram vencedores.'
    - ''

  No players:
    - ''
    - '&#ff69f0Evento cancelado.'
    - '&#ff69f0A quantidade mínima de jogadores não foi atingida.'
    - ''

  Cancelled:
    - ''
    - '&#ff69f0O evento foi cancelado manualmente.'
    - ''

  Question:
    - '&#ff69f0Pergunta &#0088ff@currentquestion&#ff69f0: &f@question'

  Side info: '&aVerde = VERDADEIRO &8| &cVermelho = FALSO'
  
  Countdown actionbar: '&eResponda em &f@time &esegundos &8| &aVerde = Verdadeiro &8| &cVermelho = Falso'
  
  Answer true: 'VERDADEIRO'
  Answer false: 'FALSO'
  Answer free: 'SEM RESPOSTA DEFINIDA'
  
  Player correct: '&aVocê acertou!'
  Player wrong: '&cVocê errou!'
  
  Result correct:
    - '&aAcertaram: &f@players'
  
  Result wrong:
    - '&cErraram e foram eliminados: &f@players'
  
  No one: 'Ninguém'

  First question:
    - '&#ff69f0A primeira pergunta começará em &#0088ff@time &#ff69f0segundos.'

  Next question:
    - '&#ff69f0Próxima pergunta em &#0088ff@time &#ff69f0segundos.'

