Messages:
  Broadcast:
    - ''
    - '&#ff69f0Evento &f@name &#ff69f0Clique @join_button &#ff69f0para participar!'
    - '&#ff69f0Prêmio: &#0088ff$&f@money &#ff69f0+ &6[BattleRoyale]'
    - '&#ff69f0Jogadores: &#0088ff@players &#ff69f0Chamadas restantes: &#0088ff@broadcasts'
    - ''

  Start:
    - ''
    - '&#ff69f0Iniciando evento...'
    - ''

  Winner:
    - ''
    - '&#ff69f0O evento &f@name &#ff69f0foi finalizado!'
    - '&#ff69f0O vencedor foi &f@winner&#ff69f0!'
    - ''

  No winner:
    - ''
    - '&#ff69f0O evento &f@name &#ff69f0foi finalizado!'
    - '&#ff69f0Não houveram vencedores.'
    - ''

  No players:
    - ''
    - '&#ff69f0Evento cancelado.'
    - '&#ff69f0A quantidade mínima de jogadores não foi atingida.'
    - ''

  Cancelled:
    - ''
    - '&#ff69f0O evento foi cancelado manualmente.'
    - ''

  Enabling:
    - '&#ff69f0O PvP será ativado em &f@time &#ff69f0segundos!'

  Enabled:
    - ''
    - '&#ff69f0O PvP foi ativado. Boa sorte a todos!'
    - ''

  Max players:
    - ''
    - '&#ff69f0A quantidade máxima de jogadores foi atingida.'
    - ''

  Actionbar: '&#ff69f0Zona: &f@radius &8| &#ff69f0Tempo: &f@time &8| &#ff69f0Inimigos: &f@enemies'

  Kill:
    - ''
    - '&#ff69f0@killer eliminou @victim'
    - ''

  Border kill:
    - ''
    - '&#ff69f0@player foi eliminado pela zona!'
    - ''

  Killstreak:
    '3':
      - '&#ff69f0@player está DOMINANDO! &7(@kills abates)'
    '5':
      - '&#ff69f0@player está ENFURECIDO! &7(@kills abates)'
    '7':
      - '&#ff69f0@player está IMPARÁVEL! &7(@kills abates)'
    '10':
      - '&#ff69f0@player é DESTRUIDOR! &7(@kills abates)'

