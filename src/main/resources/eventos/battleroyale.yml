Evento:
  # Configurações do evento.
  Title: Battle Royale
  Type: battleroyale
  Calls: 10
  Calls interval: 15
  Mininum players: 2
  Eliminate on quit: true
  Empty inventory: true
  Spectator mode: true
  Permission: absolutevents.evento
  Count participation: true
  Count victory: true
  Time: 180
  Remove blocks: false
  Multiple spawns: true
  Refill chests: true

Border:
