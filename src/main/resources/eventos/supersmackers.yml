Evento:
  Title: Super Smackers
  Type: supersmackers
  Mode: SOLO # DUO
  Calls: 10
  Calls interval: 15
  Mininum players: 2
  Eliminate on quit: true
  Empty inventory: true
  Spectator mode: true
  Permission: absolutevents.evento
  Count participation: true
  Count victory: true
  Round countdown: 3
  Round max time: 60
  Total rounds: 5
  Next round delay: 10
  Knockback horizontal: 1.35
  Knockback vertical: 0.55
  Duo auto pair: true
  Duo prefer clans: true
  Duo eliminate odd player: true

Itens:
  Enabled: true
  Inventory:
    '0':
      Type: MMOITEMS
      Id: GLOVES:B_GLOVE
      Amount: 1
    '1':
      material: ENDER_PEARL
      Amount: 8

Messages:
  Broadcast:
    - ''
    - '&#ff69f0Evento &f@name &#ff69f0Clique @join_button &#ff69f0para participar!'
    - '&#ff69f0Modo: &f@mode'
    - '&#ff69f0Jogadores: &#0088ff@players &#ff69f0Chamadas restantes: &#0088ff@broadcasts'
    - ''

  Start:
    - ''
    - '&#ff69f0Iniciando evento...'
    - ''

  No players:
    - ''
    - '&#ff69f0Evento cancelado.'
    - '&#ff69f0A quantidade mínima de jogadores não foi atingida.'
    - ''

  Cancelled:
    - ''
    - '&#ff69f0O evento foi cancelado manualmente.'
    - ''

  Round:
    - ''
    - '&#ff69f0Arena sorteada: &f@arena'
    - '&#ff69f0Confronto: @player1 &#ff69f0vs @player2'
    - ''

  Countdown:
    Three: '&#ff69f0&l3'
    Two: '&#fff000&l2'
    One: '&#ff8800&l1'
    Start: '&#00ff88&lValendo!'

  Round winner:
    - ''
    - '&#ff69f0@winner venceu a rodada!'
    - '&#ff69f0Pontuação atual: &f@points'
    - ''

  Round draw:
    - ''
    - '&#ff69f0A rodada empatou por tempo.'
    - ''

  Winner:
    - ''
    - '&#ff69f0O evento &f@name &#ff69f0foi finalizado!'
    - '&#ff69f0O vencedor foi &f@winner&#ff69f0!'
    - ''

  Team winner:
    - ''
    - '&#ff69f0O evento &f@name &#ff69f0foi finalizado!'
    - '&#ff69f0A equipe vencedora foi &f@team&#ff69f0!'
    - ''

  No winner:
    - ''
    - '&#ff69f0O evento &f@name &#ff69f0foi finalizado!'
    - '&#ff69f0Não houveram vencedores.'
    - ''

  Duo auto pair:
    - '&#ff69f0Você foi automaticamente pareado com &f@partner'

  Duo odd eliminated:
    - '&#ff69f0@player foi eliminado por não ter dupla.'

  Spectator arena:
    - '&#ff69f0Você está assistindo a luta na arena &f@arena'

  Actionbar solo:
    - '&#ff69f0Rodada: &f@round/@total_rounds &#ff69f0Pontos: &f@points'

  Actionbar duo:
    - '&#ff69f0Rodada: &f@round/@total_rounds &#ff69f0Pontos do time: &f@points'

  Lobby wait:
    - ''
    - '&#ff69f0Próxima rodada: @player1 &#ff69f0vs @player2'
    - '&#ff69f0A luta começa em &#0088ff@time &#ff69f0segundos.'
    - ''

  Round winner title:
    Title: '@winner'
    Subtitle: '&#ff69f0venceu a rodada!'

  Standings header:
    - '&8&m-----------------------------'
    - '&#ff69f0Pontuação atual:'

  Standings line solo:
    - '@color@player &7- &f@points'

  Standings line duo:
    - '@color@team &7- &f@points'

  Standings footer:
    - '&8&m-----------------------------'

Rewards:
  Money: 1000
  Commands:
    - "# adicione seus comandos aqui"
  Broadcast:
    - '&#0088ff$&f@money'

