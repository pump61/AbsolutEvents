Evento:
  Title: Nexus
  Type: nexus
  Calls: 10
  Calls interval: 15
  Mininum players: 2
  Eliminate on quit: true
  Empty inventory: true
  Spectator mode: true
  Permission: absolutevents.evento
  Count participation: true
  Count victory: true
  Blue: Azul
  Red: Vermelho
  Enable PvP: 10
  Respawn time: 5
  Invincibility: 5
  Health: 1000
  Damage: 5
  Nexus name: '&d&lNEXUS &f- @team_color&l@team_uppercase &f(&aHP: &f@health&f)'
  Map name: Howling Abyss

Towers:
  Enabled: true
  Health: 250
  Damage: 6
  Range: 22
  Attack interval: 40
  Projectile damage: 15
  Melee damage: 5
  Name: '&6&lTORRE &f- @team_color@team &f#@id &f(&cHP: &f@health&f)'

Title:
  Enabled: true
  FadeIn: 10
  Stay: 50
  FadeOut: 10
  
  Welcome:
    Title: '&bBoas-vindas a'
    Subtitle: '&f@map'
  
  Tower destroyed:
    Title: '&cTORRE DESTRUÍDA'
    Subtitle: '&f@team - Torre @tower'
  
  Nexus unlocked:
    Title: '&4NEXUS LIBERADO'
    Subtitle: '&fO Nexus da equipe @team agora pode ser destruído!'

Itens:
  Inventory:
    '0':
      material: WOODEN_SWORD
    '1':
      material: WOODEN_AXE
    '2':
      material: BOW
      enchants:
        ARROW_INFINITE: 1
    '3':
      material: COOKED_BEEF
      amount: 64
    '8':
      material: SHIELD
    '10':
      material: ARROW

